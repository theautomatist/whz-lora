# ChirpStack configuration — whz-lora project.
# Single-region (EU868) deployment for research sensor infrastructure at WHZ.

[logging]
  level="info"

[postgresql]
  # DSN uses environment variables injected via Compose.
  dsn="postgres://chirpstack:${POSTGRES_PASSWORD}@$POSTGRESQL_HOST/chirpstack?sslmode=disable"
  max_open_connections=10
  min_idle_connections=0

[redis]
  servers=["redis://$REDIS_HOST/"]
  tls_enabled=false
  cluster=false

[network]
  net_id="000000"
  # Only EU868 is enabled for the WHZ deployment.
  enabled_regions=["eu868"]

[api]
  bind="0.0.0.0:8080"
  # Secret signs login and API tokens — must be set via CHIRPSTACK_API_SECRET.
  secret="$CHIRPSTACK_API_SECRET"

[integration]
  enabled=["mqtt"]

  [integration.mqtt]
    server="tcp://$MQTT_BROKER_HOST:1883/"
    json=true
    # Credentials for ChirpStack's integration MQTT connection to Mosquitto.
    username="$CHIRPSTACK_MQTT_USERNAME"
    password="$CHIRPSTACK_MQTT_PASSWORD"
