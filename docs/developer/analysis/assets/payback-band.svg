<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="pbar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b42318"/></marker>
  </defs>
  <rect width="900" height="250" fill="#ffffff"/>
  <text x="450" y="22" font-size="12" font-weight="700" fill="#1a2230" text-anchor="middle">Amortisation ist kein Wert, sondern ein Band — aufgespannt von zwei noch ungemessenen Faktoren</text>

  <!-- Zonen-Balken (0..22 Jahre; x = 70 + Jahre*34,5) -->
  <rect x="70"  y="150" width="276" height="22" fill="#3aa564"/>            <!-- 0-8 J gruen -->
  <rect x="346" y="150" width="138" height="22" fill="#e6b13e"/>            <!-- 8-12 J amber -->
  <rect x="484" y="150" width="345" height="22" fill="#cf4a3a"/>            <!-- 12-22 J rot -->

  <!-- Horizont-Linie 10 Jahre (x=415) -->
  <line x1="415" y1="140" x2="415" y2="196" stroke="#1a2230" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="415" y="208" font-size="8.5" font-weight="700" fill="#1a2230" text-anchor="middle">Horizont 10 J.</text>

  <!-- Jahres-Achse -->
  <g font-size="8" fill="#5b6876" text-anchor="middle">
    <text x="70"  y="188">0</text>
    <text x="242" y="188">5</text>
    <text x="415" y="188">10</text>
    <text x="587" y="188">15</text>
    <text x="760" y="188">20</text>
  </g>
  <text x="450" y="230" font-size="9" fill="#5b6876" text-anchor="middle">Amortisation [Jahre] — links = wirtschaftlich, rechts = nicht innerhalb des Horizonts</text>

  <!-- Szenario-Pins -->
  <!-- 4,0 J optimistisch -->
  <circle cx="208" cy="161" r="4" fill="#1a7f37" stroke="#ffffff"/>
  <line x1="208" y1="157" x2="208" y2="92" stroke="#9aa7b4" stroke-width="0.8"/>
  <g font-size="8.5" text-anchor="middle"><text x="208" y="70" font-weight="700" fill="#1a7f37">~4,0 J. optimistisch</text><text x="208" y="82" fill="#5b6876">Fernwärme + Abgleich, Portfolio</text></g>

  <!-- 7,5 J bereinigt -->
  <circle cx="329" cy="161" r="4" fill="#1a7f37" stroke="#ffffff"/>
  <line x1="329" y1="157" x2="329" y2="116" stroke="#9aa7b4" stroke-width="0.8"/>
  <g font-size="8.5" text-anchor="middle"><text x="329" y="106" font-weight="700" fill="#1a2230">~7–8 J. bereinigt</text><text x="329" y="118" fill="#5b6876">Kostensatz, Monitoring schlank</text></g>

  <!-- 10,3 J Referenz -->
  <circle cx="425" cy="161" r="4" fill="#9a6700" stroke="#ffffff"/>
  <line x1="425" y1="157" x2="455" y2="92" stroke="#9aa7b4" stroke-width="0.8"/>
  <g font-size="8.5" text-anchor="middle"><text x="470" y="70" font-weight="700" fill="#9a6700">~10,3 J. Referenz (gebucht)</text><text x="470" y="82" fill="#5b6876">Gas, 10 % Ersparnis</text></g>

  <!-- >20 J pessimistisch -->
  <circle cx="770" cy="161" r="4" fill="#b42318" stroke="#ffffff"/>
  <line x1="770" y1="157" x2="770" y2="116" stroke="#9aa7b4" stroke-width="0.8"/>
  <g font-size="8.5" text-anchor="middle"><text x="740" y="106" font-weight="700" fill="#b42318">&gt; 20 J. pessimistisch</text><text x="740" y="118" fill="#5b6876">Gas, 5 % Ersparnis, Einzelgebäude</text></g>
  <line x1="785" y1="161" x2="828" y2="161" stroke="#b42318" stroke-width="1.4" marker-end="url(#pbar)"/>

  <!-- Treiber-Banner -->
  <rect x="70" y="238" width="760" height="0" fill="none"/>
  <text x="70" y="248" font-size="9" fill="#1a2230"><tspan font-weight="700">Bewegt dich auf dem Band:</tspan>  ① Einsparquote (netto)   ② Energieträger/Tarif  —  beide am realen Gebäude noch NICHT gemessen.</text>
</svg>
