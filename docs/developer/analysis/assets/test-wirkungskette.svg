<svg xmlns="http://www.w3.org/2000/svg" width="900" height="312" viewBox="0 0 900 312" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa7b4"/>
    </marker>
  </defs>
  <rect width="900" height="312" fill="#ffffff"/>
  <g font-size="10.5" font-weight="700" fill="#5b6876">
    <text x="110" y="18" text-anchor="middle">1 · Messung vor Ort</text>
    <text x="332" y="18" text-anchor="middle">2 · Messgröße</text>
    <text x="554" y="18" text-anchor="middle">3 · Modell-Parameter</text>
    <text x="776" y="18" text-anchor="middle">4 · Entscheidung</text>
  </g>
  <g>
    <!-- row helper: 4 boxes per row, arrows between -->
    <!-- ROW 1 -->
    <g transform="translate(0,34)">
      <rect x="10" y="0" width="200" height="50" rx="5" fill="#eef2f6" stroke="#9fb6d6"/>
      <rect x="232" y="0" width="200" height="50" rx="5" fill="#eaf1fb" stroke="#9fb6d6"/>
      <rect x="454" y="0" width="200" height="50" rx="5" fill="#fff3d6" stroke="#d6b25a"/>
      <rect x="676" y="0" width="214" height="50" rx="5" fill="#e8f6ee" stroke="#74b48a"/>
      <line x1="210" y1="25" x2="231" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="432" y1="25" x2="453" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="654" y1="25" x2="675" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <g font-size="9" fill="#1a2230" text-anchor="middle">
        <text x="110" y="21" font-weight="700">RSSI je Etage</text><text x="110" y="34">(vertikale Säule)</text>
        <text x="332" y="21" font-weight="700">Dämpfung</text><text x="332" y="34">dB / Etage</text>
        <text x="554" y="21" font-weight="700">Gateway-Dichte</text><text x="554" y="34">(Archetyp A)</text>
        <text x="783" y="21" font-weight="700">Wie viele</text><text x="783" y="34">Gateways?</text>
      </g>
    </g>
    <!-- ROW 2 -->
    <g transform="translate(0,98)">
      <rect x="10" y="0" width="200" height="50" rx="5" fill="#eef2f6" stroke="#9fb6d6"/>
      <rect x="232" y="0" width="200" height="50" rx="5" fill="#eaf1fb" stroke="#9fb6d6"/>
      <rect x="454" y="0" width="200" height="50" rx="5" fill="#fff3d6" stroke="#d6b25a"/>
      <rect x="676" y="0" width="214" height="50" rx="5" fill="#e8f6ee" stroke="#74b48a"/>
      <line x1="210" y1="25" x2="231" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="432" y1="25" x2="453" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="654" y1="25" x2="675" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <g font-size="9" fill="#1a2230" text-anchor="middle">
        <text x="110" y="21" font-weight="700">PDR &amp; RSSI/SNR</text><text x="110" y="34">@ SF12 (Worst-Case)</text>
        <text x="332" y="21" font-weight="700">Funk-Reserve</text><text x="332" y="34">(Fade-Margin)</text>
        <text x="554" y="21" font-weight="700">Fragenkatalog F7</text><text x="554" y="34">(Abdeckung am HK)</text>
        <text x="783" y="21" font-weight="700">1 vs. 2</text><text x="783" y="34">Gateways (F8)</text>
      </g>
    </g>
    <!-- ROW 3 -->
    <g transform="translate(0,162)">
      <rect x="10" y="0" width="200" height="50" rx="5" fill="#eef2f6" stroke="#9fb6d6"/>
      <rect x="232" y="0" width="200" height="50" rx="5" fill="#eaf1fb" stroke="#9fb6d6"/>
      <rect x="454" y="0" width="200" height="50" rx="5" fill="#fff3d6" stroke="#d6b25a"/>
      <rect x="676" y="0" width="214" height="50" rx="5" fill="#e8f6ee" stroke="#74b48a"/>
      <line x1="210" y1="25" x2="231" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="432" y1="25" x2="453" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="654" y1="25" x2="675" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <g font-size="9" fill="#1a2230" text-anchor="middle">
        <text x="110" y="21" font-weight="700">RSSI Low-E-Paar</text><text x="110" y="34">innen vs. Raum</text>
        <text x="332" y="21" font-weight="700">Low-E-Glas-</text><text x="332" y="34">Dämpfung (dB)</text>
        <text x="554" y="21" font-weight="700">RF-Klasse /</text><text x="554" y="34">Pfadverlust</text>
        <text x="783" y="21" font-weight="700">Sizing-</text><text x="783" y="34">Genauigkeit</text>
      </g>
    </g>
    <!-- ROW 4 (Antenne) -->
    <g transform="translate(0,226)">
      <rect x="10" y="0" width="200" height="50" rx="5" fill="#eef2f6" stroke="#9fb6d6"/>
      <rect x="232" y="0" width="200" height="50" rx="5" fill="#eaf1fb" stroke="#9fb6d6"/>
      <rect x="454" y="0" width="200" height="50" rx="5" fill="#fff3d6" stroke="#d6b25a"/>
      <rect x="676" y="0" width="214" height="50" rx="5" fill="#e8f6ee" stroke="#74b48a"/>
      <line x1="210" y1="25" x2="231" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="432" y1="25" x2="453" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <line x1="654" y1="25" x2="675" y2="25" stroke="#9aa7b4" marker-end="url(#ar)"/>
      <g font-size="9" fill="#1a2230" text-anchor="middle">
        <text x="110" y="21" font-weight="700">RSSI/PDR: High-Gain</text><text x="110" y="34">vs. Standard-Antenne</text>
        <text x="332" y="21" font-weight="700">Antennengewinn-</text><text x="332" y="34">Nutzen indoor</text>
        <text x="554" y="21" font-weight="700">Antennen- &amp;</text><text x="554" y="34">Platzierungswahl</text>
        <text x="783" y="21" font-weight="700">Antenne</text><text x="783" y="34">aufrüsten?</text>
      </g>
    </g>
  </g>
</svg>
