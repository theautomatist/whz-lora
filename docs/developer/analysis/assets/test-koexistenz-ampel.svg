<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="agreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1a7f37"/></marker>
    <marker id="ared" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b42318"/></marker>
    <marker id="ablue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f6feb"/></marker>
  </defs>
  <rect width="900" height="330" fill="#ffffff"/>

  <!-- ============ LEFT PANEL: Ampel + P_Koll-Kurve ============ -->
  <text x="230" y="20" font-size="11" font-weight="700" fill="#1a2230" text-anchor="middle">Störungs-Ampel — Fremd-Airtime (CAF) je Kanal &amp; SF</text>

  <!-- Ampel-Balken (CAF 0–15 %, 24 px/%) -->
  <rect x="50"  y="40" width="48"  height="24" fill="#3aa564" stroke="#1a7f37"/>
  <rect x="98"  y="40" width="192" height="24" fill="#e6b13e" stroke="#9a6700"/>
  <rect x="290" y="40" width="120" height="24" fill="#cf4a3a" stroke="#b42318"/>
  <g font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">
    <text x="194" y="56">GELB · beobachten</text>
    <text x="350" y="56">ROT · kritisch</text>
  </g>
  <!-- Achsen-Ticks unter dem Balken -->
  <g font-size="8" fill="#5b6876" text-anchor="middle">
    <text x="50"  y="78">0</text>
    <text x="98"  y="78">2 %</text>
    <text x="290" y="78">10 %</text>
    <text x="410" y="78">15 %</text>
    <text x="74"  y="78" fill="#1a7f37" font-weight="700">grün</text>
  </g>

  <!-- Schwellen-Verbindungslinien Balken → Kurve -->
  <g stroke="#9aa7b4" stroke-width="0.8" stroke-dasharray="3 3">
    <line x1="98"  y1="64" x2="98"  y2="250"/>
    <line x1="290" y1="64" x2="290" y2="250"/>
  </g>

  <!-- P_Koll-Kurve -->
  <text x="150" y="103" font-size="9" font-weight="700" fill="#1f6feb">P_Koll ≈ 1 − e^(−2·CAF)</text>
  <!-- Achsen -->
  <line x1="50" y1="120" x2="50" y2="250" stroke="#1a2230" stroke-width="1"/>
  <line x1="50" y1="250" x2="410" y2="250" stroke="#1a2230" stroke-width="1"/>
  <g font-size="8" fill="#5b6876" text-anchor="end">
    <text x="45" y="253">0</text>
    <text x="45" y="188">20</text>
    <text x="45" y="123">40</text>
  </g>
  <text x="14" y="188" font-size="8" fill="#5b6876" transform="rotate(-90 14 188)" text-anchor="middle">Kollisions-Wkt. P_Koll [%]</text>
  <text x="230" y="268" font-size="8.5" fill="#5b6876" text-anchor="middle">Fremd-Airtime-Anteil CAF [%]  ·  pro Kanal und SF</text>
  <!-- Kurve -->
  <polyline points="50,250 74,243.6 98,237.3 122,231.1 170,219.1 218,207.6 290,191.1 338,180.6 410,165.8"
            fill="none" stroke="#1f6feb" stroke-width="2"/>
  <!-- Schwellenpunkte -->
  <circle cx="98"  cy="237.3" r="3" fill="#9a6700"/>
  <circle cx="290" cy="191.1" r="3" fill="#b42318"/>
  <g font-size="8" font-weight="700" text-anchor="middle">
    <text x="118" y="234" fill="#9a6700">≈ 3,9 %</text>
    <text x="310" y="188" fill="#b42318">≈ 18 %</text>
  </g>
  <text x="230" y="288" font-size="8" fill="#5b6876" text-anchor="middle" font-style="italic">co-SF, gleicher Kanal · Capture-Effekt nicht eingerechnet (konservativ)</text>

  <!-- ============ Trennlinie ============ -->
  <line x1="450" y1="14" x2="450" y2="312" stroke="#d9e0e8" stroke-width="1"/>

  <!-- ============ RIGHT PANEL: Topologie / Ursache ============ -->
  <text x="675" y="20" font-size="11" font-weight="700" fill="#1a2230" text-anchor="middle">Warum ein Fremdnetz stören kann</text>

  <!-- Eigener Knoten -->
  <rect x="480" y="44" width="120" height="40" rx="5" fill="#e8f6ee" stroke="#1a7f37"/>
  <g font-size="9" fill="#1a2230" text-anchor="middle"><text x="540" y="62" font-weight="700">Eigener TRV-Aktor</text><text x="540" y="76">sendet (SFx)</text></g>

  <!-- Fremder Knoten -->
  <rect x="760" y="44" width="120" height="40" rx="5" fill="#fde8e6" stroke="#b42318" stroke-dasharray="4 3"/>
  <g font-size="9" fill="#1a2230" text-anchor="middle"><text x="820" y="62" font-weight="700">Fremdes Gerät</text><text x="820" y="76">anderes Netz</text></g>

  <!-- Geteilter Kanal -->
  <rect x="480" y="122" width="400" height="30" rx="4" fill="#fff3d6" stroke="#9a6700"/>
  <text x="680" y="141" font-size="9" font-weight="700" fill="#9a6700" text-anchor="middle">Geteilter Kanal 868,1 / 868,3 / 868,5 MHz  ·  ALOHA, kein Listen-Before-Talk</text>

  <!-- Sendepfeile auf den Kanal -->
  <line x1="540" y1="84" x2="600" y2="121" stroke="#1a7f37" stroke-width="1.6" marker-end="url(#agreen)"/>
  <line x1="820" y1="84" x2="760" y2="121" stroke="#b42318" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ared)"/>

  <!-- Kollisions-Blitz -->
  <polygon points="676,120 690,120 681,134 694,134 672,158 680,140 668,140" fill="#e6b13e" stroke="#9a6700" stroke-width="0.6"/>
  <text x="680" y="172" font-size="8.5" font-weight="700" fill="#b42318" text-anchor="middle">Kollision bei gleichem SF + Überlappung</text>

  <!-- Eigenes Gateway -->
  <rect x="560" y="208" width="230" height="44" rx="5" fill="#eaf1fb" stroke="#1f6feb"/>
  <g font-size="9.5" fill="#1a2230" text-anchor="middle"><text x="675" y="226" font-weight="700">Eigenes Gateway (Kerlink)</text><text x="675" y="240">empfängt ALLE Frames — auch fremde</text></g>
  <line x1="680" y1="152" x2="676" y2="207" stroke="#1f6feb" stroke-width="1.4" marker-end="url(#ablue)"/>
  <text x="700" y="184" font-size="8" fill="#1f6feb" font-style="italic">hört passiv mit</text>

  <!-- Erfassungs-Pfad -->
  <g font-size="8.5" fill="#5b6876" text-anchor="middle">
    <text x="675" y="272"><tspan font-family="Consolas, monospace" fill="#1a2230">eu868/gateway/+/event/up</tspan>  →  RSSI · SNR · SF · DevAddr</text>
    <text x="675" y="286">Inhalt (FRMPayload) bleibt verschlüsselt — nur Funkverkehr wird gezählt</text>
  </g>
</svg>
