<svg xmlns="http://www.w3.org/2000/svg" width="730" height="356" viewBox="0 0 730 356" font-family="Segoe UI, Arial, sans-serif">
  <rect width="730" height="356" fill="#ffffff"/>
  <text x="12" y="22" font-size="14" font-weight="700" fill="#1a2230">Prozesskette &amp; Kostenfluss — Referenzgebäude (120 Heizkörper, Altbau)</text>
  <text x="12" y="38" font-size="11" fill="#5b6876">Balkenbreite ∝ Kosten je Schritt. ⚙ = Kalkulationspunkt. CAPEX-Kern 13.200 €, vollkostenbelastet 16.840 €.</text>

  <g font-size="11">
    <!-- helper: circle + name + bar + value -->
    <!-- 1 -->
    <circle cx="20" cy="66" r="12" fill="#0e7c66"/><text x="20" y="70" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">1</text>
    <text x="40" y="70" fill="#1a2230">Erstkontakt &amp; Bedarfsklärung</text>
    <rect x="250" y="57" width="13" height="18" rx="2" fill="#0e7c66"/>
    <text x="715" y="70" text-anchor="end" font-weight="700" fill="#1a2230">320 €</text>
    <!-- 2 -->
    <circle cx="20" cy="99" r="12" fill="#0e7c66"/><text x="20" y="103" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">2</text>
    <text x="40" y="103" fill="#1a2230">Begehung &amp; Funk-Voruntersuchung</text>
    <rect x="250" y="90" width="43" height="18" rx="2" fill="#0e7c66"/>
    <text x="715" y="103" text-anchor="end" font-weight="700" fill="#1a2230">1.080 €</text>
    <!-- 3 calc -->
    <circle cx="20" cy="132" r="12" fill="#9a6700"/><text x="20" y="136" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">3</text>
    <text x="40" y="136" fill="#1a2230">⚙ Auslegung &amp; wirtschaftliches Angebot</text>
    <rect x="250" y="123" width="13" height="18" rx="2" fill="#9a6700"/>
    <text x="715" y="136" text-anchor="end" font-weight="700" fill="#1a2230">320 €</text>
    <!-- 4 hardware -->
    <circle cx="20" cy="165" r="12" fill="#1f6feb"/><text x="20" y="169" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">4</text>
    <text x="40" y="169" fill="#1a2230">Auftrag &amp; Beschaffung (Aktoren)</text>
    <rect x="250" y="156" width="362" height="18" rx="2" fill="#1f6feb"/>
    <text x="715" y="169" text-anchor="end" font-weight="700" fill="#1a2230">9.040 €</text>
    <!-- 5 -->
    <circle cx="20" cy="198" r="12" fill="#0e7c66"/><text x="20" y="202" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">5</text>
    <text x="40" y="202" fill="#1a2230">LNS- &amp; Provisioning-Vorbereitung</text>
    <rect x="250" y="189" width="13" height="18" rx="2" fill="#0e7c66"/>
    <text x="715" y="202" text-anchor="end" font-weight="700" fill="#1a2230">320 €</text>
    <!-- 6 montage -->
    <circle cx="20" cy="231" r="12" fill="#1f6feb"/><text x="20" y="235" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">6</text>
    <text x="40" y="235" fill="#1a2230">Installation &amp; Inbetriebnahme</text>
    <rect x="250" y="222" width="218" height="18" rx="2" fill="#1f6feb"/>
    <text x="715" y="235" text-anchor="end" font-weight="700" fill="#1a2230">5.440 €</text>
    <!-- 7 calc -->
    <circle cx="20" cy="264" r="12" fill="#9a6700"/><text x="20" y="268" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">7</text>
    <text x="40" y="268" fill="#1a2230">⚙ Abnahme &amp; Soll-Ist-Abgleich</text>
    <rect x="250" y="255" width="13" height="18" rx="2" fill="#9a6700"/>
    <text x="715" y="268" text-anchor="end" font-weight="700" fill="#1a2230">320 €</text>
    <!-- 8 opex -->
    <circle cx="20" cy="297" r="12" fill="#5b6876"/><text x="20" y="301" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">8</text>
    <text x="40" y="301" fill="#1a2230">Betrieb, Monitoring &amp; Wartung</text>
    <rect x="250" y="288" width="50" height="18" rx="2" fill="#5b6876"/>
    <text x="715" y="301" text-anchor="end" font-weight="700" fill="#1a2230">1.238 €/a</text>
  </g>

  <line x1="12" y1="322" x2="718" y2="322" stroke="#d9e0e8"/>
  <g font-size="10.5" fill="#5b6876">
    <rect x="12" y="332" width="11" height="11" fill="#1f6feb"/><text x="28" y="341">Hardware</text>
    <rect x="110" y="332" width="11" height="11" fill="#0e7c66"/><text x="126" y="341">Arbeit / Planung</text>
    <rect x="250" y="332" width="11" height="11" fill="#9a6700"/><text x="266" y="341">⚙ Kalkulationspunkt</text>
    <rect x="420" y="332" width="11" height="11" fill="#5b6876"/><text x="436" y="341">Betrieb (OPEX/Jahr)</text>
  </g>
</svg>
